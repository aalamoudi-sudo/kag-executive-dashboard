services:
  - type: web
    name: kag-operational-analytics
    runtime: node
    plan: free
    buildCommand: npm install && python3 -m pip install --user -r requirements.txt
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: REQUIRE_LOGIN
        value: "true"
      - key: ADMIN_USERNAME
        value: MAYADEEN
      - key: ADMIN_PASSWORD
        sync: false
      - key: VIEWER_USERNAME
        value: KAG_VIEWER
      - key: VIEWER_PASSWORD
        sync: false
      - key: SHEET_ID
        sync: false
      - key: SHEET_CSV_URL
        sync: false
