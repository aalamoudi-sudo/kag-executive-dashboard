<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حدائق الملك عبدالله 2026 — منصة التحليل التشغيلي الذكية</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="aurora aurora-a"></div>
  <div class="aurora aurora-b"></div>
  <div class="grid-bg"></div>

  <main class="platform-shell">
    <aside class="side-nav glass">
      <div class="brand-card">
        <img src="assets/riyadh-amanah-official.png" alt="شعار أمانة الرياض" class="brand-logo" onerror="this.style.display='none'">
        <div>
          <h1>حدائق الملك عبدالله 2026</h1>
          <p>منصة التحليل التشغيلي الذكية</p>
        </div>
      </div>

      <nav id="navList" class="nav-list"></nav>

      <div class="side-footer">
        <div class="system-pill"><span></span> جميع الأنظمة تعمل</div>
        <button id="logoutBtn" class="mini-btn">تسجيل الخروج</button>
      </div>
    </aside>

    <section class="workspace">
      <header class="topbar glass">
        <div class="title-block">
          <span class="eyebrow">KAG Operational Intelligence</span>
          <h2 id="pageTitle">مركز الأثر الاستراتيجي</h2>
          <p id="pageSubtitle">قراءة تشغيلية ذكية تربط المؤشرات بالأثر، القرار، المخاطر، الأدلة، وجودة البيانات.</p>
        </div>
        <div class="top-actions">
          <div class="live-chip"><i></i><b id="syncStatus">جاري المزامنة</b><small id="lastUpdate">--</small></div>
          <button class="ghost-btn" id="refreshBtn">تحديث البيانات</button>
        </div>
      </header>

      <section class="status-strip glass">
        <div><b id="statusUpdated">--</b><span>آخر تحديث</span></div>
        <div><b id="dataHealth">--</b><span>سلامة البيانات</span></div>
        <div><b id="activeAlerts">--</b><span>تنبيهات نشطة</span></div>
        <div><b id="syncedSources">--</b><span>مصادر متزامنة</span></div>
      </section>

      <section id="pageContent" class="page-content"></section>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="script.js"></script>
</body>
</html>
